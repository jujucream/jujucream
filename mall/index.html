<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>시안 미리보기</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f7fa;
}

/* 리스트 영역 */
.gallery {
  display: flex;
  gap:50px;
  padding: 40px;
  justify-content: center;
}

.gallery .box {
  width: 300px;
  height: 400px;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.2s;
  box-shadow: 0 -3px 10px rgba(0,0,0,0.15), 0 2px 6px rgba(0,0,0,0.22);
}

.gallery .box img {width: 100%; height: 100%; object-fit: cover; border-radius: 12px;}
.gallery .box h1 {text-align: center;}


.gallery img:hover {
  transform: scale(1.05);
}

/* 모달 */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.modal img {
  max-width: 90%;
  max-height: 90%;
}

/* 닫기 버튼 */
.close {
  position: absolute;
  top: 30px;
  right: 40px;
  font-size: 30px;
  color: #fff;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="gallery">
  <div class="box"><img src="Frame_01.png" alt="1안"><h1>1안</h1></div>
  <div class="box"><img src="Frame_02.png" alt="2안"><h1>2안</h1></div>
  <div class="box"><img src="Frame_03.png" alt="3안"><h1>3안</h1></div>
  <div class="box"><img src="Frame_04.png" alt="모바일"><h1>모바일</h1></div>
</div>

<div class="modal" id="modal">
  <span class="close" id="close">&times;</span>
  <img id="modalImg">
</div>



<script>
const images = document.querySelectorAll('.gallery img');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');
const closeBtn = document.getElementById('close');

images.forEach(img => {
  img.addEventListener('click', () => {
    modal.style.display = 'flex';
    modalImg.src = img.src;
  });
});

closeBtn.addEventListener('click', () => {
  modal.style.display = 'none';
});

modal.addEventListener('click', (e) => {
  if (e.target === modal) {
    modal.style.display = 'none';
  }
});
</script>

</body>
</html>
